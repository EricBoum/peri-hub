<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Shadcn 风格：纯黑底色 / 深灰边框 -->
  <rect width="512" height="512" rx="112" fill="#09090b" stroke="#27272a" stroke-width="4" />
  
  <!-- 内部元素：高对比度纯白 -->
  <g transform="translate(256, 256)">
    <!-- 极简显示器外框 -->
    <rect x="-136" y="-112" width="272" height="176" rx="24" fill="none" stroke="#fafafa" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 极简底座 -->
    <line x1="-48" y1="120" x2="48" y2="120" stroke="#fafafa" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="0" y1="64" x2="0" y2="120" stroke="#fafafa" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 内部控制元素 (两个错开的滑块，代表外设调节) -->
    <g transform="translate(0, -12)">
      <line x1="-64" y1="-16" x2="64" y2="-16" stroke="#3f3f46" stroke-width="12" stroke-linecap="round" />
      <circle cx="-16" cy="-16" r="12" fill="#fafafa" />
      
      <line x1="-64" y1="24" x2="64" y2="24" stroke="#3f3f46" stroke-width="12" stroke-linecap="round" />
      <circle cx="24" cy="24" r="12" fill="#fafafa" />
    </g>
  </g>
</svg>